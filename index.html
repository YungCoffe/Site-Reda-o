<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yung x Coffe | Injector</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-dark: #050505;
            --accent-purple: #8b5cf6;
            --accent-glow: #a78bfa;
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --card-bg: rgba(20, 20, 25, 0.6);
            --text-main: #fafafa;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            font-family: 'Inter', sans-serif;
        }

        /* Fundo Mesh Gradient Animado */
        .mesh-background {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(6, 182, 212, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 30% 20%, rgba(139, 92, 246, 0.2) 0%, transparent 50%);
            filter: blur(80px);
            animation: meshMove 20s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(5%, 5%) rotate(5deg); }
            50% { transform: translate(-5%, 10%) rotate(-5deg); }
            75% { transform: translate(10%, -5%) rotate(3deg); }
        }

        /* Partículas flutuantes */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; width: 6px; height: 6px; }
        .particle:nth-child(3) { left: 70%; top: 10%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 80%; top: 60%; animation-delay: 6s; width: 3px; height: 3px; }
        .particle:nth-child(5) { left: 40%; top: 40%; animation-delay: 8s; width: 5px; height: 5px; }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 0.8; }
        }

        /* Texto de fundo com efeito de vidro */
        .bg-text {
            position: absolute;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            opacity: 0.04;
            z-index: 2;
            user-select: none;
            pointer-events: none;
            font-size: clamp(4rem, 15vw, 12rem);
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, transparent 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textPulse 8s ease-in-out infinite;
        }

        .yung-bg { top: 5%; left: 2%; }
        .coffe-bg { bottom: 5%; right: 2%; text-align: right; }

        @keyframes textPulse {
            0%, 100% { opacity: 0.04; transform: scale(1); }
            50% { opacity: 0.08; transform: scale(1.02); }
        }

        /* Card Principal com Glassmorphism Premium */
        .main-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 
                0 8px 32px 0 rgba(0, 0, 0, 0.37),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 10;
            width: 90%;
            max-width: 480px;
            position: relative;
            overflow: hidden;
            animation: cardEntry 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Efeito de brilho no card */
        .main-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .main-card:hover::before {
            opacity: 1;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Selo de Status com animação de pulso */
        .status {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            color: var(--accent-glow);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            position: relative;
            overflow: hidden;
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(139, 92, 246, 0.3); }
            50% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.6); }
        }

        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* Tipografia Animada */
        .title { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.8rem; 
            font-weight: 800; 
            margin-bottom: 8px; 
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.6)); }
        }

        .coffe-span { 
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { 
            color: var(--text-dim); 
            font-size: 1rem; 
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        /* Botão com efeitos premium */
        .btn-purple {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: lowercase;
            margin-bottom: 25px;
            box-shadow: 
                0 10px 40px -10px rgba(139, 92, 246, 0.5),
                0 0 0 1px rgba(255,255,255,0.1) inset;
            position: relative;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }

        .btn-purple::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-purple:hover {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 
                0 20px 60px -15px rgba(139, 92, 246, 0.6),
                0 0 0 1px rgba(255,255,255,0.2) inset;
        }

        .btn-purple:hover::before {
            left: 100%;
        }

        .btn-purple:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Lista de Links com hover animado */
        .links-group { 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
        }

        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 22px;
            border-radius: 14px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: linear-gradient(180deg, #8b5cf6, #ec4899);
            transform: scaleY(0);
            transition: transform 0.3s;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateX(5px);
        }

        .link-item:hover::before {
            transform: scaleY(1);
        }

        .link-label { 
            color: #e5e5e5; 
            font-size: 0.9rem; 
            display: flex; 
            align-items: center;
            font-weight: 500;
            transition: color 0.3s;
        }

        .link-item:hover .link-label {
            color: #fff;
        }

        .dot { 
            height: 8px; 
            width: 8px; 
            background: linear-gradient(135deg, #8b5cf6, #ec4899); 
            border-radius: 50%; 
            margin-right: 12px;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
            transition: transform 0.3s;
        }

        .link-item:hover .dot {
            transform: scale(1.3);
        }

        .link-url { 
            color: #666; 
            font-size: 0.75rem;
            transition: all 0.3s;
        }

        .link-item:hover .link-url {
            color: #a78bfa;
            transform: translateX(-3px);
        }

        /* Rodapé */
        .footer {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 5;
            font-weight: 300;
            animation: fadeInUp 1s ease 0.5s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Notificação Toast Moderna */
        #toast {
            visibility: hidden;
            background: linear-gradient(135deg, rgba(20,20,25,0.95) 0%, rgba(30,30,40,0.95) 100%);
            color: var(--accent-glow);
            padding: 18px 35px;
            border-radius: 16px;
            position: fixed;
            bottom: 50px;
            font-weight: 600;
            border: 1px solid rgba(139, 92, 246, 0.3);
            z-index: 100;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                0 0 30px rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #toast.show { 
            visibility: visible;
            transform: translateY(0);
            opacity: 1;
        }

        #toast::before {
            content: '✓';
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 14px;
            font-weight: bold;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .main-card { padding: 35px 25px; }
            .title { font-size: 2.2rem; }
            .bg-text { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="mesh-background"></div>
    
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="bg-text yung-bg">YUNG</div>
    <div class="bg-text coffe-bg">COFFE</div>

    <div class="main-card">
        <div class="status">funciona de boa</div>

        <h1 class="title">Yung <span class="coffe-span">Coffe</span></h1>
        <p class="subtitle">copi cola</p>

        <button class="btn-purple" onclick="copyAction()">
            →) copiar bookmarklet
        </button>
        
        <div class="links-group">
            <a href="https://discord.gg/platformdestroyer" target="_blank" class="link-item">
                <span class="link-label"><span class="dot"></span>Discord</span>
                <span class="link-url">discord.gg/platformdestroyer</span>
            </a>
            <div class="link-item" style="cursor: pointer;" onclick="showTutorial()">
                <span class="link-label"><span class="dot"></span>Tutorial</span>
                <span class="link-url">tutorial do yungcoffe</span>
            </div>
        </div>
    </div>

    <div class="footer">
        creditos: yungcoffe | k4lleby
    </div>

    <div id="toast">Copiado com sucesso!</div>

    <script>
        function copyAction() {
            const script = `javascript:(function(){ alert('Bookmarklet Ativado!'); })();`;
            navigator.clipboard.writeText(script).then(() => {
                const t = document.getElementById("toast");
                t.className = "show";
                setTimeout(() => { t.className = ""; }, 3000);
            });
        }

        function showTutorial() {
            const t = document.getElementById("toast");
            t.innerHTML = "Tutorial em breve!";
            t.style.color = "#ec4899";
            t.className = "show";
            setTimeout(() => { 
                t.className = ""; 
                setTimeout(() => {
                    t.innerHTML = "Copiado com sucesso!";
                    t.style.color = "var(--accent-glow)";
                }, 400);
            }, 2000);
        }

        // Efeito de mouse parallax sutil
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth - e.pageX) / 50;
            const y = (window.innerHeight - e.pageY) / 50;
            document.querySelector('.mesh-background').style.transform = 
                `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
