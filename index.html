<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yung x Coffe | Injector</title>
    <style>
        /* Reset e Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #000000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fundo com Detalhes */
        .background-details {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                radial-gradient(1px 1px at 90% 90%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 50% 50%, #fff, transparent),
                radial-gradient(1px 1px at 20% 80%, #d4a373, transparent);
            background-size: 250px 250px;
            opacity: 0.3;
            animation: move 150s linear infinite;
        }

        @keyframes move { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        .bg-text {
            position: absolute;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0.05;
            z-index: 2;
            user-select: none;
        }

        .yung-bg { top: 10%; left: 5%; font-size: 6rem; color: #ff0000; }
        .coffe-bg { bottom: 15%; right: 5%; font-size: 6rem; color: #ffffff; }

        /* Card Central */
        .card {
            background: rgba(10, 10, 10, 0.9);
            padding: 50px 70px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            z-index: 10;
        }

        .title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 2px;
        }

        .yung-span { color: #ff2d55; }
        .coffe-span { color: #d4a373; }

        .subtitle {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 35px;
        }

        /* Botão Principal */
        .btn-red {
            background: linear-gradient(180deg, #d32f2f 0%, #8b0000 100%);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-red:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Botão de Ajuda e Seta */
        .help-container {
            position: absolute;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

        .help-arrow {
            color: #ff2d55;
            font-size: 1.2rem;
            margin-bottom: 5px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-5px);}
            60% {transform: translateY(-3px);}
        }

        .btn-help {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            font-size: 0.8rem;
            border-radius: 20px;
            text-decoration: none;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-help:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: #ff2d55;
        }

        /* Rodapé de Créditos Transparente */
        .footer {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.15); /* Bem transparente */
            font-size: 0.75rem;
            letter-spacing: 1px;
            z-index: 10;
        }

        /* Toast */
        #toast {
            visibility: hidden;
            background-color: #111;
            color: #ff2d55;
            padding: 12px 25px;
            position: fixed;
            bottom: 30px;
            border-radius: 10px;
            border: 1px solid #333;
            font-weight: bold;
            z-index: 100;
        }

        #toast.show { visibility: visible; animation: fadeInOut 2.5s; }
        @keyframes fadeInOut { 0% {opacity:0;} 20% {opacity:1;} 80% {opacity:1;} 100% {opacity:0;} }
    </style>
</head>
<body>

    <div class="background-details">
        <div class="stars"></div>
    </div>
    
    <div class="bg-text yung-bg">YUNG</div>
    <div class="bg-text coffe-bg">COFFE</div>

    <div class="card">
        <div class="title">
            <span class="yung-span">YUNG</span> <span class="coffe-span">COFFE</span>
        </div>
        <div class="subtitle">Redação</div>
        <button class="btn-red" onclick="copyAction()">COPIAR SCRIPT</button>
    </div>

    <div class="help-container">
        <div class="help-arrow">↓</div>
        <a href="https://discord.gg/platformdestroyer" target="_blank" class="btn-help">AJUDA</a>
    </div>

    <div class="footer">
        creditos: yungcoffe, k4lleby
    </div>

    <div id="toast">Copiado com sucesso!</div>

    <script>
        function copyAction() {
            const script = `javascript:(function(){ var b=document.getElementById('btn-inj'); if(b)b.remove(); b=document.createElement('div'); b.id='btn-inj'; b.innerHTML='INJETAR CONTEÚDO'; var style = 'position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:999999; background: linear-gradient(135deg, #ff4b2b, #ff416c); color:white; padding: 14px 40px; font-weight: 800; border-radius: 50px; box-shadow: 0 10px 20px rgba(255, 75, 43, 0.3); font-family: "Segoe UI", Tahoma, sans-serif; cursor:pointer; border: 2px solid rgba(255,255,255,0.2); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; user-select: none;'; b.style = style; b.onmouseover = function() { this.style.transform = 'translateX(-50%) scale(1.05)'; }; b.onmouseout = function() { this.style.transform = 'translateX(-50%) scale(1)'; }; document.body.appendChild(b); b.onclick=function(){ var t=prompt('yung redação'); if(!t) return; var btnAdd = document.querySelector('button') && Array.from(document.querySelectorAll('button')).find(el => el.textContent.includes('Adicionar parágrafo')); if(btnAdd) btnAdd.click(); setTimeout(function(){ var e=document.querySelector('.ql-editor') || document.querySelector('[contenteditable="true"]'); if(e){ e.focus(); document.execCommand('insertText', false, t); e.dispatchEvent(new Event('input', { bubbles: true })); alert('Injetado com sucesso!'); } else { alert('Erro: Abra um parágrafo no editor antes de injetar.'); } }, 500); }; })();`;
            const el = document.createElement('textarea');
            el.value = script;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 2500);
        }
    </script>
</body>
</html>
