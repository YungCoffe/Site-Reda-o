<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yung x Coffe | Injector</title>
    <style>
        /* Reset e Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #f5f5f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Marcas d'água de Fundo */
        .bg-text {
            position: absolute;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0.03;
            z-index: 2;
            user-select: none;
        }
        .yung-bg { top: 10%; left: 5%; font-size: 8rem; color: #ff0000; }
        .coffe-bg { bottom: 10%; right: 5%; font-size: 8rem; color: #ffffff; }

        /* Card Central sem a logo */
        .main-card {
            background: #111111;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            z-index: 10;
            width: 90%;
            max-width: 450px;
        }

        /* Status agora fica dentro do fluxo do card */
        .status {
            background: rgba(111, 66, 193, 0.15);
            color: #8a5cf5;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .title { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; }
        .coffe-span { color: #6f42c1; }
        
        /* Subtítulo atualizado */
        .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 30px; }

        /* Botão Bookmarklet */
        .btn-purple {
            background: #6f42c1;
            color: white;
            border: none;
            padding: 16px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: lowercase;
            margin-bottom: 20px;
        }
        .btn-purple:hover { background: #5a32a3; transform: scale(1.02); }

        /* Links */
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            padding: 12px 18px;
            border-radius: 10px;
            text-decoration: none;
            margin-bottom: 10px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .link-item:hover { border-color: #6f42c1; background: #222; }
        .link-label { color: #ddd; font-size: 0.85rem; display: flex; align-items: center; }
        .dot { height: 6px; width: 6px; background: #6f42c1; border-radius: 50%; margin-right: 10px; }
        .link-url { color: #555; font-size: 0.75rem; }

        /* Rodapé */
        .bottom-area {
            position: absolute;
            bottom: 20px;
            text-align: center;
            z-index: 20;
        }
        .footer-credits { color: rgba(255,255,255,0.2); font-size: 0.7rem; letter-spacing: 1px; }

        #toast {
            visibility: hidden;
            background: #1a1a1a; color: #6f42c1;
            padding: 12px 25px; border-radius: 10px;
            position: fixed; bottom: 30px; font-weight: bold;
            border: 1px solid #333; z-index: 100;
        }
        #toast.show { visibility: visible; animation: fadeInOut 2.5s; }
        @keyframes fadeInOut { 0%, 100% {opacity:0;} 20%, 80% {opacity:1;} }
    </style>
</head>
<body>

    <div class="bg-text yung-bg">YUNG</div>
    <div class="bg-text coffe-bg">COFFE</div>

    <div class="main-card">
        <div class="status">✓ funciona de boa</div>

        <div class="title">Yung <span class="coffe-span">Coffe</span></div>
        <div class="subtitle">copi cola</div>

        <button class="btn-purple" onclick="copyAction()">→) copiar bookmarklet</button>
        
        <div class="links-group">
            <a href="https://discord.gg/platformdestroyer" target="_blank" class="link-item">
                <span class="link-label"><span class="dot"></span>Discord</span>
                <span class="link-url">discord.gg/platformdestroyer</span>
            </a>
            <div class="link-item" style="cursor: pointer;" onclick="alert('tutorial indisponível')">
                <span class="link-label"><span class="dot"></span>Tutorial</span>
                <span class="link-url">tutorial do yungcoffe</span>
            </div>
        </div>
    </div>

    <div class="bottom-area">
        <div class="footer-credits">creditos: yungcoffe | k4lleby</div>
    </div>

    <div id="toast">Copiado com sucesso!</div>

    <script>
        function copyAction() {
            const script = `javascript:(function(){ alert('Copiado!'); })();`;
            const el = document.createElement('textarea');
            el.value = script;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const t = document.getElementById("toast");
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 2500);
        }
    </script>
</body>
</html>
