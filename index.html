<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yung x Coffe | Injector</title>
    <style>
        /* Reset e Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #000000; /* Fundo Totalmente Preto */
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fundo com Estrelas e Marcas d'água */
        .stars-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(1.5px 1.5px at 10% 10%, #fff, transparent),
                radial-gradient(1px 1px at 20% 40%, #fff, transparent),
                radial-gradient(2px 2px at 50% 20%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 80% 30%, #fff, transparent),
                radial-gradient(1px 1px at 90% 80%, #fff, transparent),
                radial-gradient(2px 2px at 30% 70%, #fff, transparent),
                radial-gradient(1px 1px at 70% 90%, #fff, transparent);
            background-size: 300px 300px;
            opacity: 0.5;
        }

        .bg-text {
            position: absolute;
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0.05;
            z-index: 0;
            user-select: none;
        }

        .yung-bg { top: 10%; left: 5%; font-size: 6rem; color: #ff0000; }
        .coffe-bg { bottom: 15%; right: 5%; font-size: 6rem; color: #ffffff; }

        /* Card Central */
        .card {
            background: rgba(15, 15, 15, 0.9);
            padding: 50px 70px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 50px rgba(0,0,0,1);
            z-index: 10;
        }

        .title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 2px;
            letter-spacing: 2px;
        }

        .yung-span { color: #ff2d55; text-shadow: 0 0 15px rgba(255, 45, 85, 0.4); }
        .coffe-span { color: #d4a373; }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 35px;
            text-transform: none;
        }

        /* Botão Vermelho Estilo Imagem */
        .btn-red {
            background: linear-gradient(180deg, #d32f2f 0%, #8b0000 100%);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.3);
            transition: 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-red:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.5);
            filter: brightness(1.1);
        }

        /* Rodapé de Créditos */
        .footer {
            position: absolute;
            bottom: 25px;
            color: #444;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        /* Notificação de Sucesso */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #111;
            color: #ff2d55;
            text-align: center;
            border-radius: 10px;
            padding: 14px;
            position: fixed;
            z-index: 100;
            bottom: 40px;
            font-weight: bold;
            border: 1px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        #toast.show {
            visibility: visible;
            animation: bounceIn 0.5s, fadeOut 0.5s 2.5s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; } to { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stars-background"></div>
    
    <div class="bg-text yung-bg">YUNG</div>
    <div class="bg-text coffe-bg">COFFE</div>

    <div class="card">
        <div class="title">
            <span class="yung-span">YUNG</span> <span class="coffe-span">COFFE</span>
        </div>
        <div class="subtitle">Redação</div>
        
        <button class="btn-red" onclick="copyAction()">COPIAR SCRIPT</button>
    </div>

    <div class="footer">
        creditos: yungcoffe, k4lleby
    </div>

    <div id="toast">Copiado com sucesso!</div>

    <script>
        function copyAction() {
            const scriptContent = `javascript:(function(){ var b=document.getElementById('btn-inj'); if(b)b.remove(); b=document.createElement('div'); b.id='btn-inj'; b.innerHTML='INJETAR CONTEÚDO'; var style = 'position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:999999; background: linear-gradient(135deg, #ff4b2b, #ff416c); color:white; padding: 14px 40px; font-weight: 800; border-radius: 50px; box-shadow: 0 10px 20px rgba(255, 75, 43, 0.3); font-family: "Segoe UI", Tahoma, sans-serif; cursor:pointer; border: 2px solid rgba(255,255,255,0.2); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; user-select: none;'; b.style = style; b.onmouseover = function() { this.style.transform = 'translateX(-50%) scale(1.05)'; }; b.onmouseout = function() { this.style.transform = 'translateX(-50%) scale(1)'; }; document.body.appendChild(b); b.onclick=function(){ var t=prompt('yung redação'); if(!t) return; var btnAdd = document.querySelector('button') && Array.from(document.querySelectorAll('button')).find(el => el.textContent.includes('Adicionar parágrafo')); if(btnAdd) btnAdd.click(); setTimeout(function(){ var e=document.querySelector('.ql-editor') || document.querySelector('[contenteditable="true"]'); if(e){ e.focus(); document.execCommand('insertText', false, t); e.dispatchEvent(new Event('input', { bubbles: true })); alert('Injetado com sucesso!'); } else { alert('Erro: Abra um parágrafo no editor antes de injetar.'); } }, 500); }; })();`;

            const tempInput = document.createElement('textarea');
            tempInput.value = scriptContent;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);

            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
        }
    </script>
</body>
</html>
