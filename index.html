<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yung Redação - Acesso Sala do Futuro</title>
    <style>
        /* Estilo Dark Moderno */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #0a0a0a;
            color: #efefef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: #151515;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        h2 { color: #ff416c; margin-bottom: 20px; text-transform: uppercase; font-size: 1.2rem; }

        .input-group { margin-bottom: 15px; text-align: left; }
        
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; margin-left: 5px; }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #222;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #ff4b2b; box-shadow: 0 0 8px rgba(255, 75, 43, 0.2); }

        .ra-container { display: flex; gap: 5px; }
        .ra-main { flex: 3; }
        .ra-dig { flex: 1; text-align: center; }
        .sp-tag { flex: 0.5; display: flex; align-items: center; font-weight: bold; color: #ff4b2b; }

        #btn-inj {
            margin-top: 20px;
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            border: none;
            width: 100%;
        }

        #btn-inj:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Yung Acesso</h2>
        
        <div class="input-group">
            <label>RA + Dígito</label>
            <div class="ra-container">
                <input type="number" id="ra_num" class="ra-main" placeholder="Ex: 10987654">
                <input type="text" id="ra_dig" class="ra-dig" placeholder="X" maxlength="1">
                <div class="sp-tag">SP</div>
            </div>
        </div>

        <div class="input-group">
            <label>Senha da Plataforma</label>
            <input type="password" id="ra_pass" placeholder="••••••••">
        </div>

        <button id="btn-inj">Injetar na Plataforma</button>
    </div>

    <script>
        document.getElementById('btn-inj').onclick = function() {
            const ra = document.getElementById('ra_num').value;
            const dig = document.getElementById('ra_dig').value;
            const pass = document.getElementById('ra_pass').value;
            
            if(!ra || !dig || !pass) {
                alert("Preencha todos os campos!");
                return;
            }

            const loginCompleto = ra + dig + "sp";
            
            // Pergunta o texto da redação
            let textoRedacao = prompt("Texto para injeção (Yung Redação):");
            
            if(textoRedacao) {
                // Procura o editor na página (Sala do Futuro costuma usar contenteditable)
                const editor = document.querySelector('.ql-editor') || 
                               document.querySelector('[contenteditable="true"]') || 
                               document.querySelector('textarea');

                if(editor) {
                    editor.focus();
                    // Se for um editor rico (Rich Text)
                    if(editor.tagName !== 'TEXTAREA') {
                        document.execCommand('insertText', false, textoRedacao);
                    } else {
                        // Se for um campo de texto simples
                        editor.value = textoRedacao;
                    }
                    
                    editor.dispatchEvent(new Event('input', { bubbles: true }));
                    alert("Dados injetados com sucesso para " + loginCompleto);
                } else {
                    alert("Erro: O editor de texto não foi encontrado na página aberta.");
                }
            }
        };
    </script>
</body>
</html>
